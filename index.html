<title>Mediaeater Zines 2026</title>
<meta name="description" content="Mediaeater Zines 2026 — an ongoing wordless image-zine series. 10 issues.">
<style>  :root{--red:#e01a24;--ink:#f1efe9;--bg:#000;--mute:#8a8a8a}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Baskerville,"Baskerville Old Face",Georgia,"Times New Roman",serif}
  header{max-width:1100px;margin:0 auto;padding:60px 32px 10px}
  h1{font-size:40px;letter-spacing:.06em;margin:0;font-weight:600}
  h1 .bar{display:block;width:120px;height:6px;background:var(--red);margin-top:16px}
  .nav{margin:18px 0 0;font-size:15px}
  .nav a,.note a{color:var(--mute);text-decoration:none;border-bottom:1px solid #333}
  .nav a:hover,.note a:hover{color:var(--red);border-color:var(--red)}
  main{max-width:1100px;margin:0 auto;padding:30px 32px 80px}
  main.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:34px 28px}
  .card{text-decoration:none;color:inherit;display:block}
  .cov{position:relative;aspect-ratio:1500/2100;background:#111;box-shadow:0 0 0 1px #222;transition:transform .15s,box-shadow .15s;overflow:hidden}
  .cov img{width:100%;height:100%;object-fit:cover;display:block}
  .card:hover .cov{transform:translateY(-4px);box-shadow:0 0 0 1px var(--red),0 12px 26px rgba(0,0,0,.6)}
  .cap{padding:10px 2px 0}
  .iss{display:block;color:var(--red);font-size:12px;letter-spacing:.14em}
  .ttl{display:block;font-size:17px;margin-top:2px;line-height:1.15}
</style></head><body>
